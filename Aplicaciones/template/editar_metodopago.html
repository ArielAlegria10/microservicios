{% extends "plantilla.html" %}
{% load static %}

{% block title %}Editar Método de Pago{% endblock %}

{% block contenido %}

<div class="container-xxl py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow">
                    <div class="card-body p-4">
                        <form action="{% url 'editar_metodopago' metodo.id %}" method="post">
                            {% csrf_token %}
                            <h3 class="text-center mb-4 text-warning">
                                <i class="fa fa-edit me-2"></i>Editar Método de Pago
                            </h3>

                            <div class="mb-3">
                                <label for="txt_id" class="form-label"><b>ID:</b></label>
                                <input type="text" class="form-control" name="id" id="txt_id" value="{{ metodo.id }}" readonly>
                            </div>

                            <div class="mb-3">
                                <label for="txt_descripcion" class="form-label"><b>Descripción:</b></label>
                                <input type="text" class="form-control" name="txt_descripcion" id="txt_descripcion" value="{{ metodo.descripcion }}" required>
                            </div>

                            <div class="mb-3">
                                <label for="select_estado" class="form-label"><b>Estado:</b></label>
                                <select class="form-control" name="select_estado" id="select_estado">
                                    <option value="Activo" {% if metodo.estado == 'Activo' %}selected{% endif %}>Activo</option>
                                    <option value="Inactivo" {% if metodo.estado == 'Inactivo' %}selected{% endif %}>Inactivo</option>
                                </select>
                            </div>

                            <div class="text-center mt-4">
                                <button type="submit" class="btn btn-warning btn-lg px-5">
                                    <i class="fa fa-save me-2"></i>Guardar Cambios
                                </button>
                                <a href="{% url 'listado_metodopago' %}" class="btn btn-danger btn-lg px-5">
                                    <i class="fa fa-times me-2"></i>Cancelar
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
