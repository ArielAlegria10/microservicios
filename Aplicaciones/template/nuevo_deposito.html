{% extends "./plantilla.html" %}
{% block contenido %}

<div class="row">
    <div class="col-md-3"></div>
    <div class="col-md-6">
        <div class="form-container shadow p-4">
            <form action="{% url 'nuevo_reembolso' %}" id="frm_nuevo_reembolso" method="post" enctype="multipart/form-data">
                <h3 class="text-center mb-4">Registrar Nuevo Reembolso</h3>
                {% csrf_token %}

                <!-- Monto -->
                <div class="mb-3">
                    <label for="monto"><b>Monto:</b></label>
                    <input type="number" step="0.01" class="form-control" name="monto" id="monto" min="0" required>
                </div>

                <!-- Motivo -->
                <div class="mb-3">
                    <label for="motivo"><b>Motivo:</b></label>
                    <textarea class="form-control" name="motivo" id="motivo" rows="3"></textarea>
                </div>

                <!-- Imagen -->
                <div class="mb-3">
                    <label for="imagen"><b>Imagen:</b></label>
                    <input type="file" class="form-control" name="imagen" id="imagen" accept="image/*">
                </div>

                <!-- Sucursal -->
                <div class="mb-3">
                    <label for="sucursal"><b>Sucursal:</b></label>
                    <select class="form-control" name="sucursal" id="sucursal">
                        <option value="">-- Seleccione Sucursal --</option>
                        {% for s in sucursales %}
                            <option value="{{ s.id }}">{{ s.nombre }}</option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Caja -->
                <div class="mb-3">
                    <label for="caja"><b>Caja:</b></label>
                    <select class="form-control" name="caja" id="caja">
                        <option value="">-- Seleccione Caja --</option>
                        {% for c in cajas %}
                            <option value="{{ c.id }}">{{ c.nombre }} - {{ c.sucursal.nombre }}</option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Forma de pago -->
                <div class="mb-3">
                    <label for="formapago"><b>Forma de Pago:</b></label>
                    <select class="form-control" name="formapago" id="formapago" required>
                        <option value="">-- Seleccione forma de pago --</option>
                        <option value="Efectivo">Efectivo</option>
                        <option value="Transferencia">Transferencia</option>
                        <option value="Depósito">Depósito</option>
                    </select>
                </div>

                <!-- Campo dinámico para transferencias -->
                <div class="mb-3" id="campoTransferencia" style="display:none;">
                    <label><b>N° Comprobante de Transferencia:</b></label>
                    <input type="text" class="form-control" name="comprobante_transferencia">
                </div>

                <!-- Campo dinámico para depósitos -->
                <div class="mb-3" id="campoDeposito" style="display:none;">
                    <label><b>N° Depósito:</b></label>
                    <input type="text" class="form-control" name="numero_deposito">
                </div>

                <!-- Fecha -->
                <div class="mb-3">
                    <label for="fecha"><b>Fecha:</b></label>
                    <input type="date" class="form-control" name="fecha" id="fecha" readonly value="{{ fecha_hoy|default:'' }}">
                </div>

                <center>
                    <button type="submit" class="btn btn-success">Guardar</button>
                    <a href="{% url 'listado_reembolsos' %}" class="btn btn-danger">Cancelar</a>
                </center>
            </form>
        </div>
    </div>
    <div class="col-md-3"></div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const montoInput = document.getElementById("monto");
    const fechaInput = document.getElementById("fecha");
    const formaPago = document.getElementById("formapago");
    const campoTransferencia = document.getElementById("campoTransferencia");
    const campoDeposito = document.getElementById("campoDeposito");

    montoInput.addEventListener("input", function() {
        if (parseFloat(montoInput.value) < 0) montoInput.value = 0;
    });

    if (!fechaInput.value) {
        fechaInput.value = new Date().toISOString().split('T')[0];
    }

    formaPago.addEventListener("change", function() {
        campoTransferencia.style.display = (this.value === "Transferencia") ? "block" : "none";
        campoDeposito.style.display = (this.value === "Depósito") ? "block" : "none";
    });
});
</script>

{% endblock %}
