{% extends "./plantilla.html" %}
{% block contenido %}
<link href="https://cdnjs.cloudflare.com/ajax/libs/izitoast/1.4.0/css/iziToast.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/izitoast/1.4.0/js/iziToast.min.js"></script>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="form-container shadow p-4">
                <h3 class="text-center text-primary">
                    {% if caja %}Editar Caja{% else %}Registrar Caja{% endif %}
                </h3>

                <form action="{% if caja %}{% url 'editar_caja' caja.id %}{% else %}{% url 'registrar_caja' %}{% endif %}" 
                      id="frm_caja" method="post">
                    {% csrf_token %}

                    {% if caja %}
                    <label><b>ID:</b></label>
                    <input type="text" class="form-control" name="id" value="{{ caja.id }}" readonly>
                    <br>
                    {% endif %}

                    <label><b>Nombre de la Caja:</b></label>
                    <input type="text" class="form-control" name="txt_nombre" 
                           value="{{ caja.nombre|default:'' }}" required>
                    <br>

                    <label><b>Sucursal:</b></label>
                    <select class="form-control" name="select_sucursal" required>
                        <option value="">-- Seleccione Sucursal --</option>
                        {% for sucursal in sucursales %}
                            <option value="{{ sucursal.id }}" 
                                {% if caja.sucursal and caja.sucursal.id == sucursal.id %}selected{% endif %}>
                                {{ sucursal.nombre }}
                            </option>
                        {% endfor %}
                    </select>
                    <br>

                    <label><b>Responsable:</b></label>
                    <select class="form-control" name="select_responsable">
                        <option value="">-- Seleccione Responsable --</option>
                        {% for usuario in usuarios %}
                            <option value="{{ usuario.id }}" 
                                {% if caja.responsable and caja.responsable.id == usuario.id %}selected{% endif %}>
                                {{ usuario.nombre }} {{ usuario.apellido }}
                            </option>
                        {% endfor %}
                    </select>
                    <br>

                    <label><b>Estado:</b></label>
                    <select class="form-control" name="select_estado">
                        <option value="Activo" {% if caja.estado == 'Activo' %}selected{% endif %}>Activo</option>
                        <option value="Inactivo" {% if caja.estado == 'Inactivo' %}selected{% endif %}>Inactivo</option>
                    </select>
                    <br>

                    <div class="text-center">
                        <button type="submit" class="btn btn-success">
                            {% if caja %}Guardar Cambios{% else %}Registrar{% endif %}
                        </button>
                        <a href="{% url 'listado_cajas' %}" class="btn btn-danger">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
